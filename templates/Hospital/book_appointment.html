{% extends 'base.html' %}

{% block content %}

<div class="container">
    <h2 class="mb-4">Book Appointment</h2>

    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>Doctor: {{doctor.get_name}}</h5>
                    <p>Department: {{doctor.department}}</p>
                    <p>Qualifications: {{doctor.qualifications}}</p>
                </div>
            </div>
        </div>
    </div>

    <form method="POST" class="mt-4">
        {% csrf_token %}
        <div class="mb-3">
            <label for="appointment_date" class="form-label">Appointment Date</label>
            <input type="date" id="appointment_date" class="form-control" name="appointment_date" required>
        </div>

        <div class="mb-3">
            <label for="appointment_time" class="form-label">Appointment Timing</label>
            <input type="time" id="appointment_time" class="form-control" name="time" required>
        </div>

        <div class="mb-3">
            <label for="notes" class="form-label">Notes (optional)</label>
            <textarea id="notes" class="form-control" name="notes" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Book Appointment</button>
        <a href="{% url 'doctor_profile' doctor.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
